<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Infográfico minimalista da arquitetura do Invoices OCR App</title>
  <desc id="desc">Diagrama em fundo preto com detalhes em branco, cinza e cobre mostrando o fluxo da aplicação: usuário, web Next.js, API NestJS, OCR assíncrono, OpenAI, dados, storage, chat e admin.</desc>
  <defs>
    <linearGradient id="copperLine" x1="90" y1="0" x2="1190" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8A421D"/>
      <stop offset="0.52" stop-color="#B4612A"/>
      <stop offset="1" stop-color="#6F3519"/>
    </linearGradient>
    <radialGradient id="copperGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 96) rotate(138) scale(475 222)">
      <stop stop-color="#9A4E22" stop-opacity="0.26"/>
      <stop offset="0.48" stop-color="#9A4E22" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-12%" y="-18%" width="124%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6.5L2 11" stroke="#9A4E22" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #000; }
      .grid { stroke: #ffffff; stroke-opacity: 0.035; stroke-width: 1; }
      .eyebrow { font: 700 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.2em; text-transform: uppercase; fill: #9A4E22; }
      .title { font: 650 42px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.04em; fill: #F2EEE8; }
      .subtitle { font: 400 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9A948C; }
      .cardTitle { font: 650 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.02em; fill: #F2EEE8; }
      .cardText { font: 400 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9A948C; }
      .tiny { font: 600 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.02em; fill: #D8D1C8; }
      .mono { font: 600 11px "SFMono-Regular", Consolas, monospace; fill: #9A948C; }
      .panel { fill: #080808; stroke: #2D2A27; stroke-width: 1.2; filter: url(#softShadow); }
      .panelAccent { stroke: #9A4E22; stroke-opacity: 0.85; }
      .chip { fill: #111; stroke: #2D2A27; stroke-width: 1; }
      .chipAccent { fill: #9A4E22; }
      .wire { stroke: #9A4E22; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .wireMuted { stroke: #5C544D; stroke-width: 1.4; stroke-linecap: round; stroke-dasharray: 4 8; marker-end: url(#arrow); }
      .icon { stroke: #D8D1C8; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .iconAccent { stroke: #9A4E22; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="640" rx="28"/>
  <rect width="1280" height="640" rx="28" fill="url(#copperGlow)"/>
  <path class="grid" d="M80 0V640M240 0V640M400 0V640M560 0V640M720 0V640M880 0V640M1040 0V640M1200 0V640M0 120H1280M0 280H1280M0 440H1280M0 600H1280"/>

  <text class="eyebrow" x="72" y="72">Invoices OCR App</text>
  <text class="title" x="72" y="120">Da nota fiscal ao insight conversável</text>
  <text class="subtitle" x="72" y="151">Arquitetura enxuta para upload, OCR estruturado, busca, chat com LLM e operação administrativa.</text>
  <path d="M72 184H1208" stroke="url(#copperLine)" stroke-width="1.4" opacity="0.9"/>

  <!-- Main flow cards -->
  <g transform="translate(72 230)">
    <rect class="panel panelAccent" width="198" height="132" rx="18"/>
    <path class="iconAccent" d="M48 43v44M32 59l16-16l16 16"/>
    <path class="icon" d="M116 42h36M116 62h52M116 82h42"/>
    <text class="cardTitle" x="24" y="104">Upload</text>
    <text class="cardText" x="24" y="124">PDF, PNG ou JPG</text>
  </g>

  <g transform="translate(326 230)">
    <rect class="panel" width="198" height="132" rx="18"/>
    <path class="icon" d="M40 48h118v58H40zM40 70h118"/>
    <circle cx="59" cy="59" r="3" fill="#9A4E22"/>
    <circle cx="73" cy="59" r="3" fill="#5C544D"/>
    <text class="cardTitle" x="24" y="104">Web</text>
    <text class="cardText" x="24" y="124">Next.js + sessão</text>
  </g>

  <g transform="translate(580 230)">
    <rect class="panel" width="198" height="132" rx="18"/>
    <path class="icon" d="M46 52h106M46 74h106M46 96h74"/>
    <path class="iconAccent" d="M133 91l13 13l24-29"/>
    <text class="cardTitle" x="24" y="104">API</text>
    <text class="cardText" x="24" y="124">NestJS + DTOs</text>
  </g>

  <g transform="translate(834 230)">
    <rect class="panel" width="198" height="132" rx="18"/>
    <path class="icon" d="M55 44h88M55 96h88M55 44c-20 14-20 38 0 52M143 44c20 14 20 38 0 52"/>
    <path class="iconAccent" d="M99 40v60"/>
    <text class="cardTitle" x="24" y="104">OCR</text>
    <text class="cardText" x="24" y="124">BullMQ + GPT-4o</text>
  </g>

  <g transform="translate(1088 230)">
    <rect class="panel" width="120" height="132" rx="18"/>
    <path class="icon" d="M32 52c0-11 56-11 56 0v43c0 11-56 11-56 0V52z"/>
    <path class="icon" d="M32 52c0 11 56 11 56 0M32 74c0 11 56 11 56 0"/>
    <text class="cardTitle" x="24" y="104">Dados</text>
    <text class="cardText" x="24" y="124">Prisma</text>
  </g>

  <path class="wire" d="M270 296H314"/>
  <path class="wire" d="M524 296H568"/>
  <path class="wire" d="M778 296H822"/>
  <path class="wire" d="M1032 296H1076"/>

  <!-- Supporting layer -->
  <g transform="translate(158 438)">
    <rect class="chip" width="168" height="52" rx="26"/>
    <circle cx="31" cy="26" r="7" fill="#9A4E22"/>
    <text class="tiny" x="52" y="24">OAuth</text>
    <text class="mono" x="52" y="39">Google/GitHub</text>
  </g>

  <g transform="translate(396 438)">
    <rect class="chip" width="168" height="52" rx="26"/>
    <path class="iconAccent" d="M28 33l11-14l11 14"/>
    <text class="tiny" x="62" y="24">Storage</text>
    <text class="mono" x="62" y="39">Volume / R2</text>
  </g>

  <g transform="translate(634 438)">
    <rect class="chip" width="168" height="52" rx="26"/>
    <path class="iconAccent" d="M27 26h26M40 13v26"/>
    <text class="tiny" x="62" y="24">Dedup</text>
    <text class="mono" x="62" y="39">exata + semântica</text>
  </g>

  <g transform="translate(872 438)">
    <rect class="chip" width="168" height="52" rx="26"/>
    <path class="iconAccent" d="M25 20h31v21H25zM32 27h17"/>
    <text class="tiny" x="72" y="24">Chat</text>
    <text class="mono" x="72" y="39">function calls</text>
  </g>

  <g transform="translate(1110 438)">
    <rect class="chip" width="98" height="52" rx="26"/>
    <path class="iconAccent" d="M25 35h9V22h-9v13ZM43 35h9V15h-9v20ZM61 35h9V27h-9v8Z"/>
    <text class="tiny" x="24" y="48">Admin</text>
  </g>

  <path class="wireMuted" d="M243 438C290 393 377 377 432 368"/>
  <path class="wireMuted" d="M480 438C505 396 569 375 640 362"/>
  <path class="wireMuted" d="M718 438C748 392 838 374 934 362"/>
  <path class="wireMuted" d="M956 438C935 398 932 382 932 362"/>
  <path class="wireMuted" d="M1158 438C1119 392 1095 372 1032 348"/>

  <!-- Status footer -->
  <g transform="translate(72 558)">
    <rect class="chipAccent" width="82" height="26" rx="13"/>
    <text class="tiny" x="20" y="18" fill="#F2EEE8">READY</text>
    <rect class="chip" x="96" width="104" height="26" rx="13"/>
    <text class="tiny" x="115" y="18">REJECTED</text>
    <rect class="chip" x="214" width="112" height="26" rx="13"/>
    <text class="tiny" x="233" y="18">DUPLICATE</text>
  </g>
  <text class="mono" x="984" y="577">monorepo • Railway • PostgreSQL • Redis</text>
</svg>
