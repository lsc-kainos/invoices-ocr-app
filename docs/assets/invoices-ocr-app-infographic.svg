<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
            
            .bg { fill: #000000; }
            .grid { stroke: #1a1a1a; stroke-width: 1; }
            .box { fill: #111111; stroke: #3a342a; stroke-width: 1.5; rx: 8px; }
            .box-accent { stroke: #b66e3a; stroke-width: 2; fill: #14110e; }
            
            .title { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; fill: #b66e3a; font-size: 16px; }
            .title-infra { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; fill: #d5cdb8; font-size: 14px; }
            .text-main { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; fill: #d5cdb8; font-size: 14px; }
            .text-muted { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; fill: #8a7d63; font-size: 13px; }
            .text-mono { font-family: 'JetBrains Mono', monospace; font-weight: 400; fill: #6f6553; font-size: 11px; }
            
            .line { fill: none; stroke: #6f6553; stroke-width: 2; stroke-dasharray: 4 4; }
            .line-solid { fill: none; stroke: #8a7d63; stroke-width: 2; }
            
            .badge-bg { fill: #b66e3a; }
            .badge-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; fill: #000000; font-size: 12px; }
            .badge-text-sm { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; fill: #000000; font-size: 10px; }
            
            .header-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; fill: #6f6553; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; }
        </style>
        
        <!-- Grid Pattern -->
        <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
        </pattern>

        <!-- Arrowheads -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a7d63"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" class="bg" />
    <rect width="100%" height="100%" fill="url(#gridPattern)" />

    <!-- Header -->
    <text x="480" y="40" text-anchor="middle" class="header-text">Arquitetura Macro • Paggo OCR Case</text>
    
    <!-- CONEXÕES (LINHAS) -->
    
    <!-- User -> Web -->
    <path d="M 120 270 L 192 270" class="line-solid" marker-end="url(#arrow)" />
    
    <!-- Web -> API -->
    <path d="M 360 270 L 432 270" class="line-solid" marker-end="url(#arrow)" />
    <text x="396" y="260" text-anchor="middle" class="text-mono">REST/JWT</text>
    
    <!-- API -> Redis -->
    <path d="M 620 250 C 660 250, 680 150, 732 150" class="line" marker-end="url(#arrow)" />
    <text x="660" y="195" text-anchor="middle" class="text-mono">Jobs</text>
    
    <!-- API -> Postgres -->
    <path d="M 620 270 L 732 270" class="line-solid" marker-end="url(#arrow)" />
    <text x="676" y="262" text-anchor="middle" class="text-mono">Prisma</text>

    <!-- API -> Storage -->
    <path d="M 620 290 C 660 290, 680 390, 732 390" class="line" marker-end="url(#arrow)" />
    <text x="660" y="340" text-anchor="middle" class="text-mono">Uploads</text>

    <!-- API -> OpenAI -->
    <path d="M 530 330 L 530 402" class="line-solid" marker-end="url(#arrow)" />
    <text x="540" y="370" text-anchor="start" class="text-mono">AI SDK / Zod</text>


    <!-- BLOCOS (NODES) -->
    
    <!-- User -->
    <rect x="20" y="230" width="100" height="80" class="box" />
    <text x="70" y="265" text-anchor="middle" class="title-infra">Cliente</text>
    <text x="70" y="285" text-anchor="middle" class="text-muted">Navegador</text>

    <!-- apps/web -->
    <rect x="200" y="210" width="160" height="120" class="box box-accent" />
    <text x="280" y="245" text-anchor="middle" class="title">apps/web</text>
    <text x="280" y="270" text-anchor="middle" class="text-main">Next.js 16 (App)</text>
    <text x="280" y="290" text-anchor="middle" class="text-muted">React &amp; Tailwind</text>
    <text x="280" y="315" text-anchor="middle" class="text-mono">&lt;Polling UI /&gt;</text>

    <!-- apps/api -->
    <rect x="440" y="210" width="180" height="120" class="box box-accent" />
    <text x="530" y="245" text-anchor="middle" class="title">apps/api</text>
    <text x="530" y="270" text-anchor="middle" class="text-main">NestJS 11 Core</text>
    <text x="530" y="290" text-anchor="middle" class="text-muted">Orquestrador &amp; Auth</text>
    <text x="530" y="315" text-anchor="middle" class="text-mono">{ Background Worker }</text>

    <!-- Redis -->
    <rect x="740" y="110" width="160" height="80" class="box" />
    <text x="820" y="145" text-anchor="middle" class="title-infra">Redis</text>
    <text x="820" y="165" text-anchor="middle" class="text-muted">Fila de Processamento</text>

    <!-- Postgres -->
    <rect x="740" y="230" width="160" height="80" class="box" />
    <text x="820" y="265" text-anchor="middle" class="title-infra">PostgreSQL</text>
    <text x="820" y="285" text-anchor="middle" class="text-muted">Banco Relacional</text>

    <!-- Storage -->
    <rect x="740" y="350" width="160" height="80" class="box" />
    <text x="820" y="385" text-anchor="middle" class="title-infra">Object Storage</text>
    <text x="820" y="405" text-anchor="middle" class="text-muted">S3 / Volume Local</text>

    <!-- OpenAI -->
    <rect x="440" y="410" width="180" height="80" class="box box-accent" />
    <text x="530" y="445" text-anchor="middle" class="title">OpenAI GPT-4o</text>
    <text x="530" y="465" text-anchor="middle" class="text-muted">Vision &amp; Extraction</text>


    <!-- INDICADORES DE FLUXO (BADGES) -->
    
    <!-- 1. Upload -->
    <circle cx="396" cy="235" r="9" class="badge-bg" />
    <text x="396" y="239" text-anchor="middle" class="badge-text">1</text>
    <text x="396" y="220" text-anchor="middle" class="text-mono">Upload</text>

    <!-- 2. Fila -->
    <circle cx="660" cy="170" r="9" class="badge-bg" />
    <text x="660" y="174" text-anchor="middle" class="badge-text">2</text>

    <!-- 3. AI Worker -->
    <circle cx="510" cy="370" r="9" class="badge-bg" />
    <text x="510" y="374" text-anchor="middle" class="badge-text">3</text>

    <!-- 4. Persistência -->
    <circle cx="676" cy="285" r="9" class="badge-bg" />
    <text x="676" y="289" text-anchor="middle" class="badge-text">4</text>


    <!-- LEGENDA INFERIOR -->
    <text x="20" y="440" class="header-text">Fluxo Principal</text>
    
    <!-- Coluna 1 -->
    <circle cx="28" cy="465" r="7" class="badge-bg" />
    <text x="28" y="468.5" text-anchor="middle" class="badge-text-sm">1</text>
    <text x="45" y="469" class="text-muted">Upload &amp; Validação (Magic Bytes)</text>
    
    <circle cx="28" cy="490" r="7" class="badge-bg" />
    <text x="28" y="493.5" text-anchor="middle" class="badge-text-sm">2</text>
    <text x="45" y="494" class="text-muted">Inserção na Fila Assíncrona</text>
    
    <!-- Coluna 2 -->
    <circle cx="250" cy="465" r="7" class="badge-bg" />
    <text x="250" y="468.5" text-anchor="middle" class="badge-text-sm">3</text>
    <text x="267" y="469" class="text-muted">Worker de OCR (LLM + Zod)</text>

    <circle cx="250" cy="490" r="7" class="badge-bg" />
    <text x="250" y="493.5" text-anchor="middle" class="badge-text-sm">4</text>
    <text x="267" y="494" class="text-muted">Persistência &amp; Chat</text>

</svg>
