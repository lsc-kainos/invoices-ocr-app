name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + typecheck + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-build-secret-must-be-at-least-32-chars
          GOOGLE_CLIENT_ID: ci
          GOOGLE_CLIENT_SECRET: ci
          GITHUB_CLIENT_ID: ci
          GITHUB_CLIENT_SECRET: ci
          ADMIN_EMAILS: ''
          API_URL: http://localhost:3001
          DATABASE_URL: postgresql://invoices:invoices@localhost:5432/invoices
          ALLOWED_ORIGINS: http://localhost:3000
        run: npm run build

      - name: Test
        env:
          NEXTAUTH_SECRET: ci-build-secret-must-be-at-least-32-chars
          DATABASE_URL: postgresql://invoices:invoices@localhost:5432/invoices
          ALLOWED_ORIGINS: http://localhost:3000
        run: npm run test

  e2e-backend:
    name: Backend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invoices
          POSTGRES_PASSWORD: invoices
          POSTGRES_DB: invoices
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: cd apps/api && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://invoices:invoices@localhost:5432/invoices
      - run: cd apps/api && npm run test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://invoices:invoices@localhost:5432/invoices
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: ci-e2e-secret-must-be-at-least-32-chars
          INTERNAL_SERVICE_TOKEN: ci-internal-secret-must-be-at-least-32-chars
          STORAGE_URL_SECRET: ci-storage-secret-must-be-at-least-32-chars
          ALLOWED_ORIGINS: http://localhost:3000

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: cd apps/api && npm run test:cov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage/
