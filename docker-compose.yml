services:
  postgres:
    image: postgres:16-alpine
    container_name: invoices-postgres
    environment:
      POSTGRES_USER: invoices
      POSTGRES_PASSWORD: invoices
      POSTGRES_DB: invoices
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U invoices -d invoices']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
